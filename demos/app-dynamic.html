<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>App Blog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #faf5ff;
      color: #1e293b;
      min-height: 100vh;
      padding: 12px 12px 68px;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .header h1 { font-size: 0.95rem; color: #7c3aed; font-weight: 800; }
    .search {
      width: 100%; padding: 10px 14px;
      border: 1px solid #e9d5ff; border-radius: 12px;
      font-size: 0.75rem; margin-bottom: 14px;
      background: #fff;
    }
    .featured {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .featured .tag { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
    .featured h2 { font-size: 0.85rem; margin: 6px 0; line-height: 1.3; }
    .featured p { font-size: 0.65rem; opacity: 0.85; }
    .post {
      background: #fff;
      border: 1px solid #ede9fe;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .post .cat { font-size: 0.58rem; color: #7c3aed; font-weight: 700; }
    .post h3 { font-size: 0.78rem; margin: 4px 0; }
    .post small { color: #94a3b8; font-size: 0.6rem; }
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid #ede9fe;
      display: flex; justify-content: space-around;
      padding: 10px 0 12px;
      font-size: 0.58rem; color: #94a3b8;
    }
    .nav b { color: #7c3aed; display: block; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="header"><h1>TechNews</h1><span>🔔</span></div>
  <input class="search" placeholder="🔍 Buscar artigos..." readonly />
  <article class="featured">
    <div class="tag">Destaque</div>
    <h2>Como escolher o site ideal em 2026</h2>
    <p>Guia completo para seu negócio</p>
  </article>
  <article class="post">
    <div class="cat">Negócios</div>
    <h3>5 estratégias para vender mais</h3>
    <small>28 Mai · 4 min</small>
  </article>
  <article class="post">
    <div class="cat">Tecnologia</div>
    <h3>App Android além do site</h3>
    <small>22 Mai · 3 min</small>
  </article>
  <nav class="nav">
    <div><b>📰</b>Feed</div>
    <div><b>📂</b>Categorias</div>
    <div><b>🔖</b>Salvos</div>
  </nav>
</body>
</html>
