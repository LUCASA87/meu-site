<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>App Portfólio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #050508;
      color: #fff;
      min-height: 100vh;
      padding: 14px 14px 70px;
    }
    .hero {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 18px;
      padding: 22px 16px;
      margin-bottom: 16px;
      text-align: center;
    }
    .hero h1 { font-size: 1rem; font-weight: 800; }
    .hero p { font-size: 0.68rem; opacity: 0.85; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item {
      border-radius: 14px;
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding: 10px;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .item:nth-child(1) { background: linear-gradient(135deg,#dbeafe,#3b82f6); color: #1e3a8a; }
    .item:nth-child(2) { background: linear-gradient(135deg,#fce7f3,#ec4899); color: #9d174d; }
    .item:nth-child(3) { background: linear-gradient(135deg,#d1fae5,#10b981); color: #065f46; }
    .item:nth-child(4) { background: linear-gradient(135deg,#fef3c7,#f59e0b); color: #92400e; }
    .item span { font-size: 1.6rem; margin-bottom: 4px; }
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0f0f14;
      border-top: 1px solid #27272a;
      display: flex; justify-content: space-around;
      padding: 10px 0 14px;
      font-size: 0.6rem; color: #71717a;
    }
    .nav b { color: #a78bfa; display: block; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Studio Aurora</h1>
    <p>Design · Branding · Web</p>
  </div>
  <div class="grid">
    <div class="item"><span>🎨</span>Rebrand Café</div>
    <div class="item"><span>📱</span>App FitLife</div>
    <div class="item"><span>🏠</span>Imobiliária</div>
    <div class="item"><span>✨</span>Evento Luxe</div>
  </div>
  <nav class="nav">
    <div><b>🖼️</b>Projetos</div>
    <div><b>👤</b>Sobre</div>
    <div><b>✉️</b>Contato</div>
  </nav>
</body>
</html>
